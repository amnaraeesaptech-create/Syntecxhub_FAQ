<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider</title>
    <link rel="stylesheet" href="Carousal.css">
</head>

<body>

    <div class="slider">
        <div class="slides">
            <img src="https://picsum.photos/id/1015/800/400" class="slide active">
            <img src="https://picsum.photos/id/1016/800/400" class="slide">
            <img src="https://picsum.photos/id/1018/800/400" class="slide">
            <img src="https://picsum.photos/id/1020/800/400" class="slide">
        </div>

        <button class="prev">&#10094;</button>
        <button class="next">&#10095;</button>

        <div class="dots">
            <span class="dot active-dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
    </div>

    <script src="Carousal.js"></script>
</body>

</html>
